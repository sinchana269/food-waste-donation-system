<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Available Donations - Food Waste Relief</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-light sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">🌱 FoodWasteRelief</a>
            <div class="ms-auto">
                <a href="login.html" class="btn btn-primary btn-sm">Join to Claim</a>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <h2 class="fw-bold mb-4">Current Food Availability</h2>
        <div class="row g-3 mb-5">
            <div class="col-md-8">
                <input type="text" id="searchInput" class="form-control form-control-lg" placeholder="Search by food name or location..." onkeyup="filterDonations()">
            </div>
            <div class="col-md-4">
                <select id="categoryFilter" class="form-select form-select-lg" onchange="filterDonations()">
                    <option value="">All Categories</option>
                    <option value="cooked">Cooked Food</option>
                    <option value="raw">Raw Materials</option>
                    <option value="packaged">Packaged/Canned</option>
                    <option value="fruits">Fruits & Veggies</option>
                </select>
            </div>
        </div>
        
        <div class="row g-4" id="publicDonations">
            <!-- Content loaded via JS -->
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        let allDonations = [];

        async function loadPublicDonations() {
            try {
                const response = await fetch(`${API_URL}/donations/public`);
                allDonations = await response.json();
                renderDonations(allDonations);
            } catch (err) {
                console.error("Failed to load donations", err);
            }
        }

        function renderDonations(donations) {
            const grid = document.getElementById('publicDonations');
            if (donations.length === 0) {
                grid.innerHTML = '<div class="col-12 text-center py-5"><h4>No matching donations found.</h4></div>';
                return;
            }

            grid.innerHTML = donations.map(d => `
                <div class="col-md-4">
                    <div class="card h-100 overflow-hidden shadow-sm border-0 glass">
                        <div style="height: 180px; background: rgba(0,0,0,0.03); display: flex; align-items: center; justify-content: center; font-size: 3rem; overflow: hidden;">
                            ${d.image_url ? `<img src="${API_URL}${d.image_url}" style="width: 100%; height: 100%; object-fit: cover;">` : getImagePlaceholder(d.food_name)}
                        </div>
                        <div class="card-body">
                            <h5 class="card-title fw-bold">${d.food_name}</h5>
                            <p class="card-text text-muted mb-3">${d.quantity} | ${d.location}</p>
                            <div class="d-flex justify-content-between align-items-center">
                                <span class="badge bg-success">Available</span>
                                <small class="text-muted">${new Date(d.expiry_time).toLocaleTimeString()}</small>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function filterDonations() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const category = document.getElementById('categoryFilter').value.toLowerCase();
            
            const filtered = allDonations.filter(d => {
                const matchesSearch = d.food_name.toLowerCase().includes(searchTerm) || d.location.toLowerCase().includes(searchTerm);
                const matchesCategory = !category || d.food_name.toLowerCase().includes(category) || category === "all";
                return matchesSearch && matchesCategory;
            });
            renderDonations(filtered);
        }

        function getImagePlaceholder(name) {
            name = name.toLowerCase();
            if (name.includes('rice') || name.includes('biryani') || name.includes('cooked')) return '🍲';
            if (name.includes('fruit') || name.includes('apple') || name.includes('veg')) return '🍎';
            if (name.includes('bread') || name.includes('cake')) return '🍞';
            if (name.includes('milk') || name.includes('drink')) return '🥛';
            return '🥡';
        }

        document.addEventListener('DOMContentLoaded', loadPublicDonations);
    </script>
</body>
</html>
