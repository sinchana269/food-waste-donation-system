<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Food Waste Donation System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-light py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card p-5 fade-in">
                    <h2 class="text-center fw-bold mb-4">Join the Cause</h2>
                    <form id="registerForm">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Username</label>
                                <input type="text" class="form-control" id="username" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Full Name</label>
                                <input type="text" class="form-control" id="name" required>
                            </div>
                            <div class="col-md-12">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" id="email" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Password</label>
                                <input type="password" class="form-control" id="password" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Role</label>
                                <select class="form-select" id="role">
                                    <option value="donor">Donor (Restaurant/Home)</option>
                                    <option value="ngo">NGO (Collector)</option>
                                    <option value="volunteer">Volunteer</option>
                                </select>
                            </div>
                            <div class="col-md-12">
                                <label class="form-label">Address</label>
                                <input type="text" class="form-control" id="address" required>
                            </div>
                            <div class="col-md-12 text-muted small">
                                <p>Note: We will use your address for location tracking.</p>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2 mt-4">Create Account</button>
                    </form>
                    <p class="text-center mt-4">
                        Already have an account? <a href="login.html">Login</a>
                    </p>
                </div>
                <div class="text-center mt-3 text-muted">
                    <small>Developed by <span class="fw-bold text-primary">Sinchana KJ</span></small>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        document.getElementById('registerForm').onsubmit = async (e) => {
            e.preventDefault();
            const data = {
                username: document.getElementById('username').value,
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                role: document.getElementById('role').value,
                address: document.getElementById('address').value,
                phone: "000-000-0000", // Default or add field
                lat: 0.0, lon: 0.0 // To be replaced with real coords via Maps
            };

            const result = await api_request('/register', 'POST', data);
            if (result.id) {
                alert("Registration successful! Please login.");
                window.location.href = 'login.html';
            } else {
                alert(result.detail || "Registration failed");
            }
        };
    </script>
</body>
</html>
