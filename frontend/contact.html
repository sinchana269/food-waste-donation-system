<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Food Waste Donation System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-light">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">🌱 FoodWasteRelief</a>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card p-5 fade-in">
                    <h2 class="text-center fw-bold mb-4">Contact Us</h2>
                    <p class="text-center text-muted mb-5">Have questions or want to partner with us? Reach out!</p>
                    
                    <div class="row g-4">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">Name</label>
                                <input type="text" class="form-control" placeholder="Your Name">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" placeholder="Your Email">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Subject</label>
                                <select class="form-select">
                                    <option>General Inquiry</option>
                                    <option>Partnership</option>
                                    <option>Technical Support</option>
                                    <option>Volunteer Question</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">Message</label>
                                <textarea class="form-control" rows="8" placeholder="How can we help?"></textarea>
                            </div>
                        </div>
                    </div>
                    <button class="btn btn-primary w-100 mt-4 py-2" onclick="alert('Message sent! We will get back to you soon.')">Send Message</button>
                    
                    <div class="mt-5 text-center">
                        <p class="mb-1 text-muted">Or email us directly at:</p>
                        <h5 class="text-primary">support@foodwasterelief.org</h5>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
